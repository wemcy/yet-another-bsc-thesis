openapi: 3.0.3
info:
  title: Receptkezelő webalkalmazás API
  description: Recepthozzáadás, -listázás, -szerkesztés, -törlés; allergén-alapú szűréssel.
  contact:
    name: Máté Zsolt Sándor
    email: mzsoltsandor@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v0.1.0-dev
servers:
- url: http://localhost
  description: Dummy development server
- url: http://localhost:9393/api
  description: Local development
- url: http://raspberrypi/api
  description: Local network development
tags:
- name: Health
  description: Service health / availability
- name: Recipes
  description: Recept műveletek
- name: Rating
  description: Értékelések
- name: Comment
  description: Kommentek a receptekhez
- name: Auth
  description: Felhasználói autentikáció
paths:
  "/auth/register":
    post:
      tags:
      - Auth
      summary: Felhasználó regisztráció
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/registerRequest"
      responses:
        '200':
          description: Sikeres regisztráció
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
        '400':
          description: Érvénytelen kérés (pl. az email már foglalt, gyenge jelszó)
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/identityError"
  "/auth/login":
    post:
      tags:
      - Auth
      summary: Bejelentkezés
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/loginRequest"
      responses:
        '200':
          description: Sikeres bejelentkezés – munkamenet cookie beállítva
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: A bejelentkezett felhasználó azonosítója
                  email:
                    type: string
                    format: email
        '401':
          description: Hibás email cím vagy jelszó
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid email or password
  "/auth/logout":
    post:
      tags:
      - Auth
      summary: Kijelentkezés
      operationId: logout
      responses:
        '204':
          description: Sikeres kijelentkezés, cookie törlésre kerül
        '401':
          description: Nem volt aktív munkamenet
      security:
        - cookieAuth: []
  "/alive/":
    get:
      tags:
      - Health
      summary: Állapotjelentés a szolgáltatásról
      operationId: getServiceReport
      responses:
        '200':
          description: Report is sent back
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/aliveReport"
  "/recipes/":
    get:
      tags:
      - Recipes
      summary: Receptek listázása
      operationId: listRecipes
      responses:
        '200':
          description: Receptek
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/readRecipeDTO"
    post:
      tags:
      - Recipes
      summary: Új recept létrehozása
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/createRecipeDTO"
      responses:
        '201':
          description: Recipe created successfully
          headers:
            Location:
              description: Az új erőforrás URL-je
              schema:
                type: string
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
      security:
        - cookieAuth: []
  "/recipes/{id}/":
    get:
      tags:
      - Recipes
      summary: Recept lekérdezése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A lekérdezendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: getRecipeById
      responses:
        '200':
          description: Receptek
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
    delete:
      tags:
      - Recipes
      summary: Recept törlése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A törlendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: deleteRecipeById
      responses:
        '204':
          description: Recept sikeresen törölve
        '401':
          description: Nem jogosult a művelet végrehajtására
        '404':
          description: Recept nem található
      security:
        - cookieAuth: []
    put:
      tags:
      - Recipes
      summary: Recept szerkesztése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A szerkesztendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: updateRecipeById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/createRecipeDTO"
      responses:
        '200':
          description: Recept sikeresen frissítve
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
        '401':
          description: Nem jogosult a művelet végrehajtására
        '404':
          description: Recept nem található
      security:
        - cookieAuth: []

  "/recipes/{id}/rate":
    put:
      tags:
      - Recipes
      summary: Recept értékelése ID alapján (1-5 csillag)
      parameters: 
        - name: id
          required: true
          in: path
          description: A lekérdezendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: rateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: The rating value (1-5)
      responses:
        '204':
          description: Recept értékelése sikeresen frissítve
      security:
        - cookieAuth: []
  "/recipes/{id}/image":
    put:
      tags:
      - Recipes
      summary: Recept képének frissítése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A lekérdezendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: updateRecipeImage
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload.
      responses:
        '204':
          description: Recept képe sikeresen frissítve
      security:
        - cookieAuth: []
    get:
      tags:
      - Recipes
      summary: Recept képének lekérdezése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A lekérdezendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: getRecipeImage
      responses:
        '200':
          description: Recept képe sikeresen lekérdezve
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
  "/recipes/{id}/comments":
    post:
      tags:
      - Recipes
      summary: Recept kommentelése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A lekérdezendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: addRecipeComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: The content of the comment to add.
      responses:
        '201':
          description: Comment added successfully
          headers:
            Location:
              description: Az új erőforrás URL-je
              schema:
                type: string
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/comment"
      security:
        - cookieAuth: []
  "/recipes/showcase":
    get:
      tags:
      - Recipes
      summary: Kiemelt receptek listázása
      operationId: listShowcaseRecipes
      responses:
        '200':
          description: Receptek
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/readRecipeDTO"
  "/recipes/featured":
    get:
      tags:
      - Recipes
      summary: Kiemelt recept listázása
      operationId: getFeaturedRecipe
      responses:
        '200':
          description: Receptek
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"


components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: .AspNetCore.Identity.Application
  schemas:
    aliveReport:
      type: object
      properties:
        status:
          type: string
          example: ok
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: database
              healthy:
                type: boolean
                example: true
              message:
                type: string
                nullable: true
    createRecipeDTO:
      title: createRecipeDTO
      type: object
      required:
      - title
      properties:
        title:
          type: string
          description: The title of the new recipe
          minLength: 1
        description:
          type: string
          description: Simple description of the recipe
        allergens:
          $ref: '#/components/schemas/allergenList'
        steps:
          type: array
          description: List of steps to prepare the recipe
          items:
            type: string
        ingredients:
          type: array
          description: List of ingredients needed for the recipe
          items:
            $ref: '#/components/schemas/ingredient'


    readRecipeDTO:
      type: object
      required:
      - id
      - title
      - createdAt
      - averageRating
      - comments
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        allergens:
          $ref: '#/components/schemas/allergenList'
        steps:
          type: array
          description: List of steps to prepare the recipe
          items:
            type: string
        ingredients:
          type: array
          description: List of ingredients needed for the recipe
          items:
            $ref: '#/components/schemas/ingredient'
        averageRating:
          type: number
          format: double
          description: The average rating of the recipe (1-5)
          nullable: false
        comments:
          type: array
          description: List of comments for the recipe
          nullable: false
          items:
            $ref: '#/components/schemas/comment'

    allergenList:
      type: array
      description: List of allergens present in the recipe
      items:
        $ref: '#/components/schemas/allergen'
      nullable: false
      uniqueItems: true
      minItems: 0
      maxItems: 14
      example: [1, 3, 5]
    allergen:
      type: string
      enum:
        - GLUTEN
        - CRUSTACEANS
        - EGGS
        - FISH
        - PEANUTS
        - SOYBEANS
        - MILK
        - NUTS
        - CELERY
        - MUSTARD
        - SESAMESEEDS
        - SULPHURDIOXIDE
        - LUPIN
        - MOLLUSCS
    ingredient:
      type: object
      required:
        - name
        - quantity
        - unitOfMeasurement
      properties:
        name:
          type: string
          description: The name of the ingredient
          nullable: false
        quantity:
          type: number
          description: The quantity of the ingredient needed for the recipe
          nullable: false
        unitOfMeasurement:
          type: string
          description: The unit of measure for the ingredient quantity (e.g., grams, cups, tablespoons)
          nullable: false
    comment:
      type: object
      required:
        - id
        - content
        - createdAt
        - author
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        author:
          type: string
    registerRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: The user's email address (used as username)
        password:
          type: string
          format: password
          minLength: 6
          description: Password (min 6 characters, at least one digit)
    loginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    identityError:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. DuplicateEmail)
        description:
          type: string
          description: Human-readable error description 