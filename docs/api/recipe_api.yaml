openapi: 3.0.3
info:
  title: Receptkezelő webalkalmazás API
  description: Recepthozzáadás, -listázás, -szerkesztés, -törlés; allergén-alapú szűréssel.
  contact:
    name: Máté Zsolt Sándor
    email: mzsoltsandor@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v0.1.0-dev
servers:
- url: http://localhost
  description: Dummy development server
- url: http://localhost:9393/api
  description: Local development
- url: http://raspberrypi/api
  description: Local network development
tags:
- name: Health
  description: Service health / availability
- name: Recipes
  description: Recept műveletek
- name: Rating
  description: Értékelések
- name: Comment
  description: Kommentek a receptekhez
paths:
  "/alive/":
    get:
      tags:
      - Health
      summary: Állapotjelentés a szolgáltatásról
      operationId: getServiceReport
      responses:
        '200':
          description: Report is sent back
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/aliveReport"
  "/recipes/":
    get:
      tags:
      - Recipes
      summary: Receptek listázása
      operationId: listRecipes
      responses:
        '200':
          description: Receptek
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/readRecipeDTO"
    post:
      tags:
      - Recipes
      summary: Új recept létrehozása
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/createRecipeDTO"
      responses:
        '201':
          description: Recipe created successfully
          headers:
            Location:
              description: Az új erőforrás URL-je
              schema:
                type: string
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
  "/recipes/{id}/":
    get:
      tags:
      - Recipes
      summary: Recept lekérdezése ID alapján
      parameters: 
        - name: id
          required: true
          in: path
          description: A lekérdezendő recept egyedi azonosítója (UUID)
          schema:
            type: string
            format: uuid
      operationId: getRecipeById
      responses:
        '200':
          description: Receptek
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"


components:
  # securitySchemes:
  #   bearerAuth:
  #     type: http
  #     scheme: bearer
  #     bearerFormat: JWT
  schemas:
    aliveReport:
      type: object
      properties:
        status:
          type: string
          example: ok
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: database
              healthy:
                type: boolean
                example: true
              message:
                type: string
                nullable: true
    createRecipeDTO:
      title: createRecipeDTO
      type: object
      required:
      - title
      properties:
        title:
          type: string
          description: The title of the new recipe
          minLength: 1
        description:
          type: string
          description: Simple description of the recipe
        allergens:
          $ref: '#/components/schemas/allergenList'
        steps:
          type: array
          description: List of steps to prepare the recipe
          items:
            type: string
        ingredients:
          type: array
          description: List of ingredients needed for the recipe
          items:
            $ref: '#/components/schemas/ingredient'


    readRecipeDTO:
      type: object
      required:
      - id
      - title
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        allergens:
          $ref: '#/components/schemas/allergenList'
        steps:
          type: array
          description: List of steps to prepare the recipe
          items:
            type: string
        ingredients:
          type: array
          description: List of ingredients needed for the recipe
          items:
            $ref: '#/components/schemas/ingredient'

    allergenList:
      type: array
      description: List of allergens present in the recipe
      items:
        $ref: '#/components/schemas/allergen'
      nullable: false
      uniqueItems: true
      minItems: 0
      maxItems: 14
      example: [1, 3, 5]
    allergen:
      type: string
      enum:
        - GLUTEN
        - CRUSTACEANS
        - EGGS
        - FISH
        - PEANUTS
        - SOYBEANS
        - MILK
        - NUTS
        - CELERY
        - MUSTARD
        - SESAMESEEDS
        - SULPHURDIOXIDE
        - LUPIN
        - MOLLUSCS
    ingredient:
      type: object
      required:
        - name
        - quantity
        - unitOfMeasurement
      properties:
        name:
          type: string
          description: The name of the ingredient
          nullable: false
        quantity:
          type: number
          description: The quantity of the ingredient needed for the recipe
          nullable: false
        unitOfMeasurement:
          type: string
          description: The unit of measure for the ingredient quantity (e.g., grams, cups, tablespoons)
          nullable: false