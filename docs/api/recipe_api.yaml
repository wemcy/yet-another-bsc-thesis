openapi: 3.0.3
info:
  title: Recipe Management Web Application API
  description: Recipe create/list/update/delete operations with allergen-based filtering.
  contact:
    name: Máté Zsolt Sándor
    email: mzsoltsandor@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v0.1.0-dev
servers:
- url: http://localhost
  description: Dummy development server
- url: http://localhost:9393/api
  description: Local development
- url: http://raspberrypi/api
  description: Local network development
tags:
- name: Health
  description: Service health / availability
- name: Recipes
  description: Recipe operations
- name: Rating
  description: Ratings
- name: Comment
  description: Comments on recipes
- name: Auth
  description: User authentication
- name: Profile
  description: User profile operations
paths:
  "/search":
    get:
      tags:
      - Recipes
      summary: Search recipes by title
      operationId: searchRecipes
      parameters:
        - name: title
          in: query
          description: The title or part of the title to search for
          required: true
          schema:
            type: string
        - name: includeAllergens
          in: query
          description: List of allergens to include (comma-separated, e.g. "GLUTEN,PEANUTS")
          required: false
          schema:
            "$ref": "#/components/schemas/allergenSearchList"
        - name: excludeAllergens
          in: query
          description: List of allergens to exclude (comma-separated, e.g. "GLUTEN,PEANUTS")
          required: false
          schema:
            "$ref": "#/components/schemas/allergenSearchList"
      responses:
        '200':
          description: Recipes matching the search criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/searchRecipeDTO"
  "/auth/register":
    post:
      tags:
      - Auth
      summary: User registration
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/registerRequest"
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/loginResponse"
        '400':
          description: Invalid request (e.g., email already in use, weak password)
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/identityError"
  "/auth/login":
    post:
      tags:
      - Auth
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/loginRequest"
      responses:
        '200':
          description: Login successful; session cookie set
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/loginResponse"

        '401':
          description: Invalid email address or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid email or password
  "/auth/logout":
    post:
      tags:
      - Auth
      summary: Logout
      operationId: logout
      responses:
        '204':
          description: Logout successful; cookie removed
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
  "/profile/me":
    get:
      tags:
      - Profile
      summary: Get the logged-in user profile
      operationId: getOwnProfile
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/profileResponse"
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

      security:
        - cookieAuth: []
    put:
      tags:
      - Profile
      summary: Update the logged-in user profile
      operationId: updateOwnProfile
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/updateProfileRequest"
      responses:
        '204':
          description: Update successful
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
  "/profile/me/image":
    get:
      tags:
      - Profile
      summary: Get the logged-in user profile image
      operationId: getOwnProfileImage
      responses:
        '200':
          description: Profile image retrieved successfully
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

      security:
        - cookieAuth: []
  "/profile/{id}/image":
    get:
      tags:
      - Profile
      summary: Get user profile image by ID
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the user to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: getProfileImageById
      responses:
        '200':
          description: Profile image retrieved successfully
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Profile image or user not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

  "/profile/{id}":
    get:
      tags:
      - Profile
      summary: Get user profile by ID
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the user to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: getProfileById
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/profileResponse"
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

        '404':
          description: User not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

      security:
        - cookieAuth: []
    put:
      tags:
      - Profile
      summary: Update user profile by ID
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the user to update (UUID)
          schema:
            type: string
            format: uuid
      operationId: updateProfileById
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/updateProfileRequest"
      responses:
        '204':
          description: User profile updated successfully
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

        '403':
          description: Not the owner of this user profile
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

        '404':
          description: User not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security: 
        - cookieAuth: []
    delete:
      tags:
      - Profile
      summary: Delete user by ID
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the user to delete (UUID)
          schema:
            type: string
            format: uuid
      operationId: deleteProfileById
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '403':
          description: Not the owner of this user profile
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
  "/profile/{id}/roles":
    post:
      tags:
      - Profile
      summary: Update user roles by ID
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the user to update (UUID)
          schema:
            type: string
            format: uuid
      operationId: addRoleToProfileById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  "$ref": "#/components/schemas/rolesEnum"
      responses:
        '204':
          description: User roles updated successfully
        '401':
          description: No active session
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '403':
          description: Not authorized to perform this operation (csak adminok módosíthatják a szerepköröket)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: User not found
          content:
              application/json:
                schema:
                  "$ref": "#/components/schemas/errorResponse"
        '410':
          description: Invalid role provided
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"

      security:
        - cookieAuth: []
  "/profile/{id}/recipes":
    get:
      tags:
      - Recipes
      summary: List recipes by user ID
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the user to query (UUID)
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: The page number to retrieve (starting from 0)
          required: false
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: The number of items per page (default is 25)
          required: false
          schema:
            type: integer
            minimum: 25
            maximum: 100
      operationId: getRecipesByAuthorId
      responses:
        '200':
          description: Recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/readRecipeDTO" 
          headers:
            X-Pagination:
              description: Pagination metadata in JSON format
              schema:
                "$ref": "#/components/schemas/paginationMetadata"
  "/alive/":
    get:
      tags:
      - Health
      summary: Service health report
      operationId: getServiceReport
      responses:
        '200':
          description: Report is sent back
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/aliveReport"
  "/recipes/":
    get:
      tags:
      - Recipes
      summary: List recipes
      operationId: listRecipes
      parameters:
        - name: page
          in: query
          description: The page number to retrieve (starting from 0)
          required: false
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: The number of items per page (default is 25)
          required: false
          schema:
            type: integer
            minimum: 25
            maximum: 100
        - name: includeAllergens
          in: query
          description: List of allergens to include (comma-separated, e.g. "GLUTEN,PEANUTS")
          required: false
          schema:
            "$ref": "#/components/schemas/allergenSearchList"
        - name: excludeAllergens
          in: query
          description: List of allergens to exclude (comma-separated, e.g. "GLUTEN,PEANUTS")
          required: false
          schema:
            "$ref": "#/components/schemas/allergenSearchList"
      responses:
        '200':
          description: Recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/readRecipeDTO"
          headers:
            X-Pagination:
              description: Pagination metadata in JSON format
              schema:
                "$ref": "#/components/schemas/paginationMetadata"
    post:
      tags:
      - Recipes
      summary: Create a new recipe
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/createRecipeDTO"
      responses:
        '201':
          description: Recipe created successfully
          headers:
            Location:
              description: URL of the newly created resource
              schema:
                type: string
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
      security:
        - cookieAuth: []
  "/recipes/{id}/":
    get:
      tags:
      - Recipes
      summary: Get recipe by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: getRecipeById
      responses:
        '200':
          description: Recipes
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
    delete:
      tags:
      - Recipes
      summary: Delete recipe by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to delete (UUID)
          schema:
            type: string
            format: uuid
      operationId: deleteRecipeById
      responses:
        '204':
          description: Recipe deleted successfully
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
    put:
      tags:
      - Recipes
      summary: Update recipe by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to update (UUID)
          schema:
            type: string
            format: uuid
      operationId: updateRecipeById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/createRecipeDTO"
      responses:
        '200':
          description: Recipe updated successfully
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
  "/recipes/{id}/rate":
    put:
      tags:
      - Recipes
      summary: Rate recipe by ID (1-5 stars)
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: rateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: The rating value (1-5)
      responses:
        '204':
          description: Recipe rating updated successfully
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
  "/recipes/{id}/image":
    put:
      tags:
      - Recipes
      summary: Update recipe image by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: updateRecipeImage
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload.
      responses:
        '204':
          description: Recipe image updated successfully
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
    get:
      tags:
      - Recipes
      summary: Get recipe image by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: getRecipeImage
      responses:
        '200':
          description: Recipe image retrieved successfully
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
  "/recipes/{id}/comments":
    post:
      tags:
      - Recipes
      summary: Add comment to recipe by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
      operationId: addRecipeComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: The content of the comment to add.
      responses:
        '201':
          description: Comment added successfully
          headers:
            Location:
              description: URL of the newly created resource
              schema:
                type: string
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/comment"
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
    get:
      tags:
      - Recipes
      summary: List comments for recipe by ID
      parameters: 
        - name: id
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: The page number to retrieve (starting from 0)
          required: false
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: The number of items per page (default is 25)
          required: false
          schema:
            type: integer
            minimum: 25
            maximum: 100
      operationId: listRecipeComments
      responses:
        200:
          description: Comments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/comment"
          headers:
            X-Pagination:
              description: Pagination metadata in JSON format
              schema:
                "$ref": "#/components/schemas/paginationMetadata"
        404:
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
  "/recipes/{recipeId}/comments/{commentId}":
    delete:
      tags:
      - Recipes
      summary: Delete recipe comment by ID
      parameters: 
        - name: recipeId
          required: true
          in: path
          description: Unique identifier of the recipe to query (UUID)
          schema:
            type: string
            format: uuid
        - name: commentId
          required: true
          in: path
          description: Unique identifier of the comment to delete (UUID)
          schema:
            type: string
            format: uuid
      operationId: deleteRecipeComment
      responses:
        '204':
          description: Recipe comment deleted successfully
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe or comment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []
  "/recipes/showcase":
    get:
      tags:
      - Recipes
      summary: List featured recipes
      operationId: listShowcaseRecipes
      responses:
        '200':
          description: Recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/readRecipeDTO"
  "/recipes/featured":
    get:
      tags:
      - Recipes
      summary: Get featured recipe
      operationId: getFeaturedRecipe
      responses:
        '200':
          description: Recipes
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/readRecipeDTO"
    put:
      tags:
      - Recipes
      summary: Update featured recipe
      operationId: updateFeaturedRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipeId
              properties:
                recipeId:
                  type: string
                  format: uuid
                  description: The unique identifier of the recipe to set as featured.
      responses:
        '204':
          description: Featured recipe updated successfully
        '401':
          description: Not authorized to perform this operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
        '410':
          description: Format error (e.g., invalid UUID)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/errorResponse"
      security:
        - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: .AspNetCore.Identity.Application
  schemas:
    aliveReport:
      type: object
      properties:
        status:
          type: string
          example: ok
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: database
              healthy:
                type: boolean
                example: true
              message:
                type: string
                nullable: true
    createRecipeDTO:
      title: createRecipeDTO
      type: object
      required:
      - title
      properties:
        title:
          type: string
          description: The title of the new recipe
          minLength: 1
        description:
          type: string
          description: Simple description of the recipe
        allergens:
          $ref: '#/components/schemas/allergenList'
        steps:
          type: array
          description: List of steps to prepare the recipe
          items:
            type: string
        ingredients:
          type: array
          description: List of ingredients needed for the recipe
          items:
            $ref: '#/components/schemas/ingredient'

    paginationMetadata:
      type: object
      properties:
        totalCount:
          type: integer
          description: Total number of items available
        pageNumber:
          type: integer
          description: Current page number (starting from 0)
        currentPage:
          type: integer
          description: Current page number (starting from 0)
        pageSize:
          type: integer
          description: Number of items per page
        hasNextPage:
          type: boolean
          description: Indicates if there is a next page available
        hasPreviousPage:
          type: boolean
          description: Indicates if there is a previous page available
    rolesEnum:
      type: string
      enum:
        - Admin
      description: 'Role to assign to the user (currently supported: "Admin")'

    readRecipeDTO:
      type: object
      required:
      - id
      - title
      - createdAt
      - averageRating
      - comments
      - creatorDisplayName
      properties:
        id:
          type: string
          format: uuid
        creatorDisplayName:
          type: string
          description: The display name of the recipe's author
        title:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        allergens:
          $ref: '#/components/schemas/allergenList'
        steps:
          type: array
          description: List of steps to prepare the recipe
          items:
            type: string
        ingredients:
          type: array
          description: List of ingredients needed for the recipe
          items:
            $ref: '#/components/schemas/ingredient'
        averageRating:
          type: number
          format: double
          description: The average rating of the recipe (1-5)
          nullable: false
    searchRecipeDTO:
      type: object
      required:
      - id
      - title
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string


    allergenList:
      type: array
      description: List of allergens present in the recipe
      items:
        $ref: '#/components/schemas/allergen'
      nullable: false
      uniqueItems: true
      minItems: 0
      maxItems: 14
    allergenSearchList:
      type: array
      description: List of allergens to search for in the recipe
      items:
        $ref: '#/components/schemas/allergen'
      nullable: true
      uniqueItems: true
      minItems: 0
      maxItems: 14
    allergen:
      type: string
      enum:
        - GLUTEN
        - CRUSTACEANS
        - EGGS
        - FISH
        - PEANUTS
        - SOYBEANS
        - MILK
        - NUTS
        - CELERY
        - MUSTARD
        - SESAMESEEDS
        - SULPHURDIOXIDE
        - LUPIN
        - MOLLUSCS
    
    ingredient:
      type: object
      required:
        - name
        - quantity
        - unitOfMeasurement
      properties:
        name:
          type: string
          description: The name of the ingredient
          nullable: false
        quantity:
          type: number
          description: The quantity of the ingredient needed for the recipe
          nullable: false
        unitOfMeasurement:
          type: string
          description: The unit of measure for the ingredient quantity (e.g., grams, cups, tablespoons)
          nullable: false
    comment:
      type: object
      required:
        - id
        - content
        - createdAt
        - author
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        author:
          type: string
    registerRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: The user's email address (used as username)
        password:
          type: string
          format: password
          minLength: 6
          description: Password (min 6 characters, at least one digit)
        displayName:
          type: string
          description: The user's display name
    loginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    identityError:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. DuplicateEmail)
        description:
          type: string
          description: Human-readable error description 
    loginResponse:
      type: object
      required:
        - id
        - email
        - displayName
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the logged-in user
        email:
          type: string
          format: email
        displayName:
          type: string
          description: Display name of the logged-in user
    profileResponse:
      type: object
      required:
        - id
        - email
        - displayName
        - registeredAt
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the logged-in user
        email:
          type: string
          format: email
        displayName:
          type: string
          description: Display name of the logged-in user
        registeredAt:
          type: string
          format: date-time
          description: Registration timestamp of the logged-in user
    updateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
          description: The user's display name
        password:
          type: string
          format: password
          minLength: 6
          nullable: true
          description: Password 
        profileImage:
          type: string
          format: binary
          nullable: true
          description: The profile image file to upload.
        email:
          type: string
          format: email
          nullable: true
          description: The user's email address (used as username)
    errorResponse:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message describing what went wrong.


